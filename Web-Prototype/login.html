<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>登录 — 小宁学习</title>
<style>
:root {
  --bg:      oklch(99% 0.003 240);
  --surface: oklch(100% 0 0);
  --ink:     oklch(20% 0.035 258);
  --fg:      oklch(19% 0.014 255);
  --fg-on-ink: oklch(96% 0.012 258);
  --muted:   oklch(50% 0.014 255);
  --border:  oklch(91% 0.007 250);
  --accent:  oklch(58% 0.185 258);
  --accent-bright: oklch(74% 0.15 258);
  --green:   oklch(54% 0.09 155);
  --rose:    oklch(55% 0.13 25);
  --font-display: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Segoe UI', system-ui, sans-serif;
  --font-body:    -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Segoe UI', system-ui, sans-serif;
  --font-mono:    'JetBrains Mono', 'SF Mono', ui-monospace, Menlo, monospace;
  --radius-sm: 8px;
  --radius-md: 10px;
  --radius-lg: 14px;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { -webkit-font-smoothing: antialiased; }
body {
  font-family: var(--font-body); font-size: 16px; line-height: 1.6; color: var(--fg); background: var(--bg);
  min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 24px;
}
a { color: inherit; text-decoration: none; }
svg { display: block; }
.icon { width: 17px; height: 17px; stroke: currentColor; fill: none; stroke-width: 1.7; stroke-linecap: round; stroke-linejoin: round; }

.auth-back { position: fixed; top: 28px; left: 28px; display: flex; align-items: center; gap: 7px; font-size: 14px; color: var(--muted); transition: color 0.15s; }
.auth-back:hover { color: var(--fg); }

/* ===== CARD ===== */
.auth-card { width: 100%; max-width: 420px; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 44px 38px; }
.auth-header { text-align: center; margin-bottom: 32px; }
.auth-logo { display: inline-flex; align-items: center; gap: 11px; font-family: var(--font-display); font-size: 21px; font-weight: 600; letter-spacing: -0.01em; color: var(--fg); margin-bottom: 18px; }
.auth-logo-mark { width: 34px; height: 34px; background: var(--ink); border-radius: var(--radius-sm); display: flex; align-items: center; justify-content: center; color: var(--accent-bright); font-family: var(--font-display); font-size: 16px; font-weight: 600; }
.auth-header h1 { font-family: var(--font-display); font-size: 22px; font-weight: 500; letter-spacing: -0.005em; margin-bottom: 6px; }
.auth-header p { font-size: 14px; color: var(--muted); }

/* ===== TABS ===== */
.auth-tabs { display: flex; border-bottom: 1px solid var(--border); margin-bottom: 28px; }
.auth-tab { flex: 1; text-align: center; padding: 12px 0; font-size: 14px; font-weight: 550; color: var(--muted); cursor: pointer; border: none; background: none; font-family: var(--font-body); border-bottom: 2px solid transparent; transition: all 0.15s; }
.auth-tab:hover { color: var(--fg); }
.auth-tab.active { color: var(--fg); border-bottom-color: var(--accent); }
.auth-form { display: none; flex-direction: column; gap: 20px; }
.auth-form.active { display: flex; }

/* ===== FORM ===== */
.form-group { display: flex; flex-direction: column; gap: 7px; }
.form-group label { font-size: 12.5px; font-weight: 600; color: var(--fg); font-family: var(--font-mono); text-transform: uppercase; letter-spacing: 0.04em; }
.form-group input { padding: 12px 14px; border: 1px solid var(--border); border-radius: var(--radius-md); font-size: 15px; font-family: var(--font-body); color: var(--fg); background: var(--surface); outline: none; transition: border-color 0.15s; }
.form-group input:focus { border-color: var(--accent); }
.form-group input::placeholder { color: oklch(72% 0.01 265); }
.form-row { display: flex; justify-content: space-between; align-items: center; font-size: 13px; }
.form-row label { display: flex; align-items: center; gap: 7px; color: var(--muted); cursor: pointer; }
.form-row label input[type="checkbox"] { accent-color: var(--accent); }
.form-row a { color: var(--accent); font-weight: 600; }
.form-row a:hover { text-decoration: underline; }

.btn { display: inline-flex; align-items: center; justify-content: center; gap: 8px; padding: 14px 28px; border-radius: var(--radius-md); font-family: var(--font-body); font-size: 15px; font-weight: 600; cursor: pointer; border: 1px solid transparent; transition: all 0.2s ease; width: 100%; }
.btn-primary { background: var(--accent); color: oklch(99% 0.01 90); }
.btn-primary:hover { background: oklch(52% 0.135 75); }
.btn-outline { background: transparent; color: var(--fg); border-color: var(--border); }
.btn-outline:hover { border-color: var(--fg); }
.btn:disabled { opacity: 0.5; cursor: not-allowed; }

/* ===== DIVIDER ===== */
.auth-divider { display: flex; align-items: center; gap: 16px; color: var(--muted); font-size: 12px; font-family: var(--font-mono); }
.auth-divider::before, .auth-divider::after { content: ''; flex: 1; height: 1px; background: var(--border); }

/* ===== SOCIAL ===== */
.social-btns { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; }
.social-btn { display: flex; align-items: center; justify-content: center; padding: 12px; border-radius: var(--radius-md); border: 1px solid var(--border); background: var(--surface); cursor: pointer; transition: all 0.15s; color: var(--fg); }
.social-btn:hover { border-color: var(--fg); }
.social-btn svg { width: 18px; height: 18px; }

/* ===== FOOTER TEXT ===== */
.auth-footer { text-align: center; font-size: 13px; color: var(--muted); margin-top: 24px; }
.auth-footer a { color: var(--accent); font-weight: 600; }
.auth-footer a:hover { text-decoration: underline; }

/* ===== SUCCESS STATE ===== */
.success-state { display: none; text-align: center; padding: 40px 0; }
.success-state.show { display: block; }
.success-icon { width: 52px; height: 52px; border-radius: 50%; background: var(--ink); color: var(--accent-bright); display: flex; align-items: center; justify-content: center; margin: 0 auto 20px; }
.success-icon svg { width: 24px; height: 24px; }
.success-state h2 { font-family: var(--font-display); font-size: 21px; font-weight: 500; margin-bottom: 8px; }
.success-state p { color: var(--muted); font-size: 14px; }

/* ===== PASSWORD TOGGLE ===== */
.password-wrapper { position: relative; }
.password-wrapper input { width: 100%; padding-right: 44px; }
.password-toggle { position: absolute; right: 10px; top: 50%; transform: translateY(-50%); background: none; border: none; color: var(--muted); cursor: pointer; padding: 6px; display: flex; }
.password-toggle:hover { color: var(--fg); }

@media (max-width: 480px) {
  .auth-card { padding: 32px 22px; }
  body { padding: 16px; justify-content: flex-start; padding-top: 64px; }
  .auth-back { top: 18px; left: 18px; }
  .social-btns { grid-template-columns: 1fr; }
}
</style>
</head>
<body>

<a href="index.html" class="auth-back"><svg class="icon" viewBox="0 0 24 24"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>返回首页</a>

<div class="auth-card">
  <div class="auth-header">
    <div class="auth-logo">
      <span class="auth-logo-mark">宁</span>
      小宁学习
    </div>
    <h1>欢迎回来</h1>
    <p>登录后继续你的编程学习之旅</p>
  </div>

  <!-- Tabs -->
  <div class="auth-tabs">
    <button class="auth-tab active" data-form="login">登录</button>
    <button class="auth-tab" data-form="register">注册</button>
  </div>

  <!-- ===== LOGIN FORM ===== -->
  <div class="auth-form-container">
    <div class="auth-form active" id="form-login">
      <div class="form-group">
        <label>邮箱地址</label>
        <input type="email" placeholder="your@email.com" id="loginEmail">
      </div>
      <div class="form-group">
        <label>密码</label>
        <div class="password-wrapper">
          <input type="password" placeholder="••••••••" id="loginPassword">
          <button class="password-toggle" onclick="togglePwd('loginPassword',this)" type="button" aria-label="显示密码">
            <svg class="icon" viewBox="0 0 24 24"><path d="M1 12s4-7 11-7 11 7 11 7-4 7-11 7-11-7-11-7z"/><circle cx="12" cy="12" r="3"/></svg>
          </button>
        </div>
      </div>
      <div class="form-row">
        <label><input type="checkbox" checked> 记住我</label>
        <a href="#">忘记密码？</a>
      </div>
      <button class="btn btn-primary" onclick="handleLogin()">登 录</button>

      <div class="auth-divider">或使用以下方式登录</div>

      <div class="social-btns">
        <div class="social-btn" onclick="socialLogin('微信')" title="微信"><svg class="icon" viewBox="0 0 24 24"><path d="M9.5 4.5C5.9 4.5 3 7 3 10.1c0 1.8 1 3.4 2.6 4.5l-.6 1.9 2.2-1.1c.7.2 1.5.3 2.3.3h.4"/><path d="M14.5 9.5c3.1 0 5.7 2.1 5.7 4.7 0 1.5-.9 2.9-2.3 3.8l.5 1.6-1.9-.9c-.6.2-1.3.3-2 .3-3.1 0-5.7-2.1-5.7-4.7s2.5-4.8 5.7-4.8z"/></svg></div>
        <div class="social-btn" onclick="socialLogin('GitHub')" title="GitHub"><svg class="icon" viewBox="0 0 24 24"><path d="M9 19c-4.3 1.4-4.3-2.5-6-3m12 5v-3.5c0-1 .1-1.4-.5-2 2-.2 4.5-1 4.5-4.5 0-1-.5-2-1-2.5.1-.5.4-1.5-.1-3 0 0-.9-.3-3 1a11 11 0 0 0-5.6 0c-2.1-1.3-3-1-3-1-.5 1.5-.2 2.5-.1 3-.5.5-1 1.5-1 2.5 0 3.5 2.5 4.3 4.5 4.5-.3.3-.5.9-.5 1.5v3.5"/></svg></div>
        <div class="social-btn" onclick="socialLogin('Google')" title="Google"><svg class="icon" viewBox="0 0 24 24"><path d="M21 12.2c0-.7-.1-1.4-.2-2H12v3.9h5c-.2 1.2-.9 2.2-2 2.9v2.4h3.1c1.9-1.7 2.9-4.2 2.9-7.2z"/><path d="M12 21c2.6 0 4.8-.9 6.1-2.4l-3.1-2.4c-.9.6-2 .9-3 .9-2.3 0-4.3-1.5-5-3.6H3.8v2.4C5.2 19 8.4 21 12 21z"/><path d="M7 13.5c-.2-.6-.3-1.3-.3-1.9s.1-1.3.3-1.9V7.3H3.8A9 9 0 0 0 3 11.6c0 1.5.4 2.9 1 4.1z"/><path d="M12 6.1c1.4 0 2.7.5 3.6 1.4l2.8-2.7C16.8 3.2 14.6 2.2 12 2.2 8.4 2.2 5.2 4.3 3.8 7.3l3.2 2.4c.7-2.1 2.7-3.6 5-3.6z"/></svg></div>
      </div>
    </div>

    <!-- ===== REGISTER FORM ===== -->
    <div class="auth-form" id="form-register">
      <div class="form-group">
        <label>昵称</label>
        <input type="text" placeholder="你的名字" id="regName">
      </div>
      <div class="form-group">
        <label>邮箱地址</label>
        <input type="email" placeholder="your@email.com" id="regEmail">
      </div>
      <div class="form-group">
        <label>密码</label>
        <div class="password-wrapper">
          <input type="password" placeholder="至少 8 位字符" id="regPassword">
          <button class="password-toggle" onclick="togglePwd('regPassword',this)" type="button" aria-label="显示密码">
            <svg class="icon" viewBox="0 0 24 24"><path d="M1 12s4-7 11-7 11 7 11 7-4 7-11 7-11-7-11-7z"/><circle cx="12" cy="12" r="3"/></svg>
          </button>
        </div>
      </div>
      <div class="form-row">
        <label><input type="checkbox"> 我已阅读并同意《用户协议》</label>
      </div>
      <button class="btn btn-primary" onclick="handleRegister()">免费注册</button>

      <div class="auth-divider">或使用以下方式注册</div>

      <div class="social-btns">
        <div class="social-btn" onclick="socialLogin('微信')" title="微信"><svg class="icon" viewBox="0 0 24 24"><path d="M9.5 4.5C5.9 4.5 3 7 3 10.1c0 1.8 1 3.4 2.6 4.5l-.6 1.9 2.2-1.1c.7.2 1.5.3 2.3.3h.4"/><path d="M14.5 9.5c3.1 0 5.7 2.1 5.7 4.7 0 1.5-.9 2.9-2.3 3.8l.5 1.6-1.9-.9c-.6.2-1.3.3-2 .3-3.1 0-5.7-2.1-5.7-4.7s2.5-4.8 5.7-4.8z"/></svg></div>
        <div class="social-btn" onclick="socialLogin('GitHub')" title="GitHub"><svg class="icon" viewBox="0 0 24 24"><path d="M9 19c-4.3 1.4-4.3-2.5-6-3m12 5v-3.5c0-1 .1-1.4-.5-2 2-.2 4.5-1 4.5-4.5 0-1-.5-2-1-2.5.1-.5.4-1.5-.1-3 0 0-.9-.3-3 1a11 11 0 0 0-5.6 0c-2.1-1.3-3-1-3-1-.5 1.5-.2 2.5-.1 3-.5.5-1 1.5-1 2.5 0 3.5 2.5 4.3 4.5 4.5-.3.3-.5.9-.5 1.5v3.5"/></svg></div>
        <div class="social-btn" onclick="socialLogin('Google')" title="Google"><svg class="icon" viewBox="0 0 24 24"><path d="M21 12.2c0-.7-.1-1.4-.2-2H12v3.9h5c-.2 1.2-.9 2.2-2 2.9v2.4h3.1c1.9-1.7 2.9-4.2 2.9-7.2z"/><path d="M12 21c2.6 0 4.8-.9 6.1-2.4l-3.1-2.4c-.9.6-2 .9-3 .9-2.3 0-4.3-1.5-5-3.6H3.8v2.4C5.2 19 8.4 21 12 21z"/><path d="M7 13.5c-.2-.6-.3-1.3-.3-1.9s.1-1.3.3-1.9V7.3H3.8A9 9 0 0 0 3 11.6c0 1.5.4 2.9 1 4.1z"/><path d="M12 6.1c1.4 0 2.7.5 3.6 1.4l2.8-2.7C16.8 3.2 14.6 2.2 12 2.2 8.4 2.2 5.2 4.3 3.8 7.3l3.2 2.4c.7-2.1 2.7-3.6 5-3.6z"/></svg></div>
      </div>
    </div>

    <!-- ===== SUCCESS STATE ===== -->
    <div class="success-state" id="successState">
      <div class="success-icon"><svg class="icon" viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg></div>
      <h2 id="successTitle">欢迎回来！</h2>
      <p id="successDesc">正在跳转到你的学习主页……</p>
    </div>
  </div>

  <div class="auth-footer">
    还没有账号？<a href="#" onclick="switchTab('register');return false;">立即注册</a>
  </div>
</div>

<script>
function togglePwd(inputId, btn) {
  const input = document.getElementById(inputId);
  input.type = input.type === 'password' ? 'text' : 'password';
}

// Tab switching
document.querySelectorAll('.auth-tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.auth-tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.auth-form').forEach(f => f.classList.remove('active'));
    tab.classList.add('active');
    document.getElementById('form-' + tab.dataset.form).classList.add('active');

    const header = document.querySelector('.auth-header h1');
    const sub = document.querySelector('.auth-header p');
    if (tab.dataset.form === 'login') {
      header.textContent = '欢迎回来';
      sub.textContent = '登录后继续你的编程学习之旅';
    } else {
      header.textContent = '开始学习';
      sub.textContent = '注册即开启你的编程学习之旅，全程免费试学';
    }
  });
});

function switchTab(name) {
  const tab = document.querySelector(`.auth-tab[data-form="${name}"]`);
  if (tab) tab.click();
}

function handleLogin() {
  const email = document.getElementById('loginEmail').value;
  if (!email) { alert('请输入邮箱地址'); return; }
  showSuccess('欢迎回来！', `正在为你跳转，${email}……`);
}

function handleRegister() {
  const name = document.getElementById('regName').value;
  if (!name) { alert('请输入昵称'); return; }
  showSuccess('注册成功！', `${name}，欢迎加入小宁学习，你的编程之旅开始了！`);
}

function socialLogin(provider) {
  showSuccess('正在连接', `正在通过 ${provider} 进行身份验证……`);
}

function showSuccess(title, desc) {
  document.querySelectorAll('.auth-form').forEach(f => f.classList.remove('active'));
  document.querySelectorAll('.auth-tab').forEach(t => t.classList.remove('active'));
  document.getElementById('successState').classList.add('show');
  document.getElementById('successTitle').textContent = title;
  document.getElementById('successDesc').textContent = desc;
}
</script>

</body>
</html>
